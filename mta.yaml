_schema-version: 3.3.0
ID: service_request_management_system
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: service_request_management_system-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: service_request_management_system-db
      - name: service_request_management_system-auth
      - name: service_request_management_system-destination

  - name: service_request_management_system-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: service_request_management_system-db

  - name: service_request_management_system-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: service_request_management_systemproject1
          artifacts:
            - project1.zip
          target-path: app/
    requires:
      - name: service_request_management_system-auth
      - name: srv-api
      - name: service_request_management_system-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: service_request_management_systemproject1
    type: html5
    path: app/project1
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: service_request_management_system-destinations
    type: com.sap.application.content
    requires:
      - name: service_request_management_system-auth
        parameters:
          service-key:
            name: service_request_management_system-auth-key
      - name: service_request_management_system-html5-repo-host
        parameters:
          service-key:
            name: service_request_management_system-html5-repo-host-key
      - name: srv-api
      - name: service_request_management_system-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: service_request_management_system-html5-repository
              ServiceInstanceName: service_request_management_system-html5-repo-host
              ServiceKeyName: service_request_management_system-html5-repo-host-key
              sap.cloud.service: service_request_management_system.service
            - Name: service_request_management_system-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: service_request_management_system-auth
              ServiceKeyName: service_request_management_system-auth-key
              sap.cloud.service: service_request_management_system.service

resources:
  - name: service_request_management_system-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: service_request_management_system-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: service_request_management_system-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'admin (service_request_management_system ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
  - name: service_request_management_system-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
    requires:
      - name: srv-api

  - name: service_request_management_system-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
